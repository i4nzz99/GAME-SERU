<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project Game: Neon Catcher RGB Shop Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        @keyframes rgbAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            min-height: 100vh;
            background: #0d0e15;
            background-size: 400% 400%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 10px;
            transition: background 0.5s ease;
        }

        .game-wrapper {
            background: #181a26;
            border: 2px solid #00f2fe;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
            text-align: center;
            width: 100%;
            max-width: 440px;
            position: relative;
            overflow: hidden;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.6rem;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        .btn-shop-toggle {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }

        .btn-shop-toggle:active { transform: scale(0.9); }

        .hud-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .hud-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .hud-box span { font-weight: bold; }

        #gameCanvas {
            background: #212433;
            border-radius: 10px;
            display: block;
            margin: 0 auto 15px auto;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .controls-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: #fff;
            touch-action: manipulation; 
        }

        .btn-left { background: linear-gradient(135deg, #ff007f, #7928ca); }
        .btn-right { background: linear-gradient(135deg, #7928ca, #ff007f); }
        
        .btn-system {
            grid-column: span 2;
            background: #24283b;
            border: 1px solid #414868;
            padding: 12px;
            font-size: 0.9rem;
        }

        .shop-window {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 14, 21, 0.98);
            z-index: 20;
            padding: 20px;
            flex-direction: column;
            overflow-y: auto;
        }

        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #414868;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .shop-close {
            background: #ff007f;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .shop-section-title {
            text-align: left;
            font-size: 0.9rem;
            color: #00f2fe;
            margin: 15px 0 5px 0;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .shop-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1c1f30;
            border: 1px solid #323652;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .item-preview {
            width: 30px;
            height: 25px;
            border-radius: 4px;
            box-shadow: 0 0 8px currentColor;
        }

        .preview-rgb-rainbow {
            background: linear-gradient(45deg, #ff0000, #ff7700, #ffdd00, #00ff00, #0000ff, #8b00ff);
        }

        .item-info {
            flex-grow: 1;
            text-align: left;
            padding-left: 15px;
        }

        .item-name { font-weight: bold; font-size: 0.9rem; }
        .item-price { font-size: 0.8rem; color: #ffd700; }

        .btn-buy {
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #00f2fe;
            color: #000;
        }
        .btn-buy.owned { background: #e2e2e2; color: #000; }
        .btn-buy.active-skin { background: #2ecc71; color: #fff; }

        .reward-popup {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 22, 33, 0.98);
            border: 3px solid #ffd700;
            border-radius: 15px;
            padding: 25px;
            width: 85%;
            z-index: 10;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .money-visual {
            width: 180px; height: 85px;
            background: #2ecc71;
            border: 4px double #fff;
            margin: 15px auto;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }

        .money-val { font-size: 1.3rem; font-weight: 900; }

        .btn-claim {
            background: #ffd700; color: #111;
            padding: 10px 25px; border: none; border-radius: 5px;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>

                Isi Dompet (Tabungan): <span id="walletDisplay" style="color: #ffd700;">Rp 0</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="350" height="350"></canvas>

            <button class="btn btn-left" id="leftBtn">◀ TAHAN KIRI</button>
            <button class="btn btn-right" id="rightBtn">TAHAN KANAN ▶</button>
            <button class="btn btn-system" id="startResetBtn">Mulai Game</button>
        </div>
